name: Android CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: android-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Static checks and unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Grant Gradle wrapper execute permission
        run: chmod +x gradlew

      - name: Run formatting, unit tests, and lint
        run: ./gradlew --no-daemon spotlessCheck testDebugUnitTest lintDebug
